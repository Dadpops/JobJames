services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      - PORT=8000
      # Allow both the nginx frontend and direct browser access during local testing
      - ALLOWED_ORIGINS=["http://localhost","http://localhost:80","http://localhost:8000"]
      # SQLite stored in the named volume for persistence across docker-compose restarts
      - DATABASE_URL=/data/jobjames.db
    volumes:
      - jobjames_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Browser talks directly to the backend — use the host-accessible port
        VITE_API_URL: http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  jobjames_data:
