[build]
builder = "DOCKERFILE"

[build.buildArgs]
# Set VITE_API_URL in your Railway frontend service environment variables.
# Railway injects env vars as build args when listed here.
VITE_API_URL = "$VITE_API_URL"

[deploy]
startCommand = "nginx -g 'daemon off;'"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
